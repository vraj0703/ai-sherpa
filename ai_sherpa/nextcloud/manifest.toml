# manifest.toml — NextCloud Sherpa (v2)
# Authority: CONSTITUTION.toml Article IV

[meta]
name            = "nextcloud"
version         = "2.0.0"
authority       = "CONSTITUTION.toml Article IV"
status          = "active"

[sherpa]
purpose         = "CRUD operations on NextCloud via the Pi API service — file operations, state management, domain data for finance/health/house-ops/career/infrastructure"
language        = "python"
entry_point     = "main.py"
model           = "qwen2.5-coder:7b"
invoked_by      = ["PM", "Mr. V", "Ministers"]
reports_to      = "invoker"

[invocation]
command         = "python -m ai_sherpa nextcloud"
args            = ["--op <operation>", "--path <path>", "--domain <name>"]

[dependencies]
python_packages = []
node_packages   = []
ollama_models   = ["qwen2.5-coder:7b"]
external        = ["NextCloud API (http://192.168.1.100:3481)", "gateway/nextcloud.cjs"]
